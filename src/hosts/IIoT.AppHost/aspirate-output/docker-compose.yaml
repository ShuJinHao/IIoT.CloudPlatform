version: '3.8'

services:
  # 1. 监控中心 (Aspire Dashboard)
  aspire-dashboard:
    image: "${IIOT_DASHBOARD_IMAGE}"
    environment:
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      DASHBOARD__FRONTEND__AUTHMODE: "Unsecured"
      DASHBOARD__OTLP__AUTHMODE: "Unsecured"
    ports:
      - "18888:18888"
      - "18889:18889"
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

  # 2. 基础组件 - Redis
  redis-cache:
    image: "${IIOT_REDIS_IMAGE}"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "redis-cache"
    networks:
      - iiot-net

  # 3. 基础组件 - PostgreSQL (TimescaleDB)
  postgres:
    image: "${IIOT_POSTGRES_IMAGE}"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: "iiot-db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "postgres"
    volumes:
      - "postgres-iiot:/var/lib/postgresql/data"
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

  # 4. 基础组件 - RabbitMQ
  rabbitmq:
    image: "${IIOT_RABBITMQ_IMAGE}"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "rabbitmq"
    volumes:
      - "rabbitmq-iiot:/var/lib/rabbitmq"
    ports:
      - "15672:15672"
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

  # 5. 数据库迁移 (一次性任务)
  iiot-migration:
    image: "${IIOT_MIGRATION_IMAGE}"
    environment:
      ConnectionStrings__iiot-db: "Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db"
      ConnectionStrings__redis-cache: "redis-cache:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "iiot-migration"
    networks:
      - iiot-net
    depends_on:
      - postgres
      - redis-cache
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # 6. 业务后端 (API)
  iiot-httpapi:
    image: ${IIOT_HTTPAPI_IMAGE}
    environment:
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__iiot-db: "Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db"
      ConnectionStrings__redis-cache: "redis-cache:6379"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "iiot-httpapi"
    volumes:
      - "httpapi-logs:/app/logs"
    networks:
      - iiot-net
    depends_on:
      - postgres
      - redis-cache
      - rabbitmq
    deploy:
      replicas: ${HTTPAPI_REPLICAS:-3}
      restart_policy:
        condition: on-failure

  # 7. 数据消费者 (DataWorker)
  iiot-dataworker:
    image: ${IIOT_DATAWORKER_IMAGE}
    environment:
      ConnectionStrings__iiot-db: "Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db"
      ConnectionStrings__redis-cache: "redis-cache:6379"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "iiot-dataworker"
    volumes:
      - "dataworker-logs:/app/logs"
    networks:
      - iiot-net
    depends_on:
      - postgres
      - rabbitmq
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # 8. 业务前端 (Web)
  iiot-web:
    image: ${IIOT_WEB_IMAGE}
    command: ["npx", "serve", "-s", "dist", "-l", "8000"]
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://${SERVER_IP}:${GATEWAY_PORT}/api
    networks:
      - iiot-net
    deploy:
      replicas: ${WEB_REPLICAS:-2}

  # 9. 专业闸口 (Nginx Gateway)
  nginx-gateway:
    image: "${IIOT_NGINX_IMAGE}"
    ports:
      - "${GATEWAY_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  iiot-net:
    driver: overlay
    attachable: true

volumes:
  postgres-iiot: {}
  rabbitmq-iiot: {}
  httpapi-logs: {}
  dataworker-logs: {}