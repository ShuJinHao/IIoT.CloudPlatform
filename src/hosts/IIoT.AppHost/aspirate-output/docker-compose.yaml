version: '3.8'

services:
  aspire-dashboard:
    image: "${IIOT_DASHBOARD_IMAGE}"
    environment:
      DASHBOARD__FRONTEND__AUTHMODE: "BrowserToken"
      DASHBOARD__FRONTEND__BROWSERTOKEN: "${ASPIRE_DASHBOARD_FRONTEND_BROWSERTOKEN}"
      DASHBOARD__OTLP__AUTHMODE: "ApiKey"
      DASHBOARD__OTLP__PRIMARYAPIKEY: "${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
    ports:
      - "18888:18888"
      - "18889:18889"
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

  redis-cache:
    image: "${IIOT_REDIS_IMAGE}"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
      OTEL_SERVICE_NAME: "redis-cache"
    networks:
      - iiot-net

  postgres:
    image: "${IIOT_POSTGRES_IMAGE}"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: "iiot-db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
      OTEL_SERVICE_NAME: "postgres"
    volumes:
      - "postgres-iiot:/var/lib/postgresql/data"
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

  rabbitmq:
    image: "${IIOT_RABBITMQ_IMAGE}"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
      OTEL_SERVICE_NAME: "rabbitmq"
    volumes:
      - "rabbitmq-iiot:/var/lib/rabbitmq"
    ports:
      - "15672:15672"
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

  iiot-migration:
    image: "${IIOT_MIGRATION_IMAGE}"
    environment:
      ConnectionStrings__iiot-db: "Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db"
      ConnectionStrings__redis-cache: "redis-cache:6379"
      JwtSettings__Secret: "${JWTSETTINGS__SECRET}"
      SEED_ADMIN_NO: "${SEED_ADMIN_NO}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD}"
      SEED_ADMIN_REAL_NAME: "${SEED_ADMIN_REAL_NAME:-系统管理员}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
      OTEL_SERVICE_NAME: "iiot-migration"
    networks:
      - iiot-net
    depends_on:
      - postgres
      - redis-cache
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  iiot-httpapi:
    image: ${IIOT_HTTPAPI_IMAGE}
    environment:
      HTTP_PORTS: "8080"
      ConnectionStrings__iiot-db: "Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db"
      ConnectionStrings__redis-cache: "redis-cache:6379"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672"
      JwtSettings__Secret: "${JWTSETTINGS__SECRET}"
      ForwardedHeaders__Enabled: "${FORWARDED_HEADERS_ENABLED:-true}"
      ForwardedHeaders__ForwardLimit: "${FORWARDED_HEADERS_FORWARDLIMIT:-2}"
      ForwardedHeaders__KnownNetworks__0: "${FORWARDED_HEADERS_KNOWNNETWORKS__0:-172.16.0.0/12}"
      ForwardedHeaders__KnownNetworks__1: "${FORWARDED_HEADERS_KNOWNNETWORKS__1:-10.0.0.0/8}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
      OTEL_SERVICE_NAME: "iiot-httpapi"
    volumes:
      - "httpapi-logs:/app/logs"
    networks:
      - iiot-net
    depends_on:
      - postgres
      - redis-cache
      - rabbitmq
    deploy:
      replicas: ${HTTPAPI_REPLICAS:-3}
      restart_policy:
        condition: on-failure

  iiot-gateway:
    image: ${IIOT_GATEWAY_IMAGE}
    environment:
      HTTP_PORTS: "8080"
      ReverseProxy__Clusters__httpapi__Destinations__primary__Address: "http://iiot-httpapi:8080/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
      OTEL_SERVICE_NAME: "iiot-gateway"
    networks:
      - iiot-net
    depends_on:
      - iiot-httpapi
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  iiot-dataworker:
    image: ${IIOT_DATAWORKER_IMAGE}
    environment:
      ConnectionStrings__iiot-db: "Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db"
      ConnectionStrings__redis-cache: "redis-cache:6379"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672"
      JwtSettings__Secret: "${JWTSETTINGS__SECRET}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${ASPIRE_DASHBOARD_OTLP_PRIMARYAPIKEY}"
      OTEL_SERVICE_NAME: "iiot-dataworker"
    volumes:
      - "dataworker-logs:/app/logs"
    networks:
      - iiot-net
    depends_on:
      - postgres
      - rabbitmq
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  iiot-web:
    image: ${IIOT_WEB_IMAGE}
    command: ["npx", "serve", "-s", "dist", "-l", "8000"]
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${PUBLIC_BASE_URL}/api
    networks:
      - iiot-net
    deploy:
      replicas: ${WEB_REPLICAS:-2}

  nginx-gateway:
    image: "${IIOT_NGINX_IMAGE}"
    ports:
      - "${GATEWAY_HTTP_PORT:-81}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  iiot-net:
    driver: overlay
    attachable: true

volumes:
  postgres-iiot: {}
  rabbitmq-iiot: {}
  httpapi-logs: {}
  dataworker-logs: {}
