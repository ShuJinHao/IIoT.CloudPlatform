version: '3.8'

services:
  # 1. 监控中心 (Aspire Dashboard)
  aspire-dashboard:
    image: "${IIOT_DASHBOARD_IMAGE}"
    environment:
      # 🌟 彻底干掉令牌墙 (兼容新旧版本)
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      DASHBOARD__FRONTEND__AUTHMODE: "Unsecured"
      DASHBOARD__OTLP__AUTHMODE: "Unsecured"
    ports:
      - "18888:18888" # UI 控制台
      - "18889:18889" # OTLP 日志接收端口
    networks:
      - iiot-net      # 🌟 核心修复：将仪表盘接入内部网络
    deploy:
      placement:
        constraints: [node.role == manager]

  # 2. 基础组件
  redis-cache:
    image: "${IIOT_REDIS_IMAGE}"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "redis-cache"
    networks:
      - iiot-net

  postgres:
    image: "${IIOT_POSTGRES_IMAGE}"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: "iiot-db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "postgres"
    volumes:
      - "postgres-iiot:/var/lib/postgresql/data"
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

  # 3. 业务后端 (API)
  iiot-httpapi:
    image: ${IIOT_HTTPAPI_IMAGE}
    environment:
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__iiot-db: "Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db"
      ConnectionStrings__redis-cache: "redis-cache:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "iiot-httpapi"
    networks:
      - iiot-net
    deploy:
      replicas: ${HTTPAPI_REPLICAS:-3}
      restart_policy:
        condition: on-failure

  # 4. 业务前端 (Web)
  iiot-web:
    image: ${IIOT_WEB_IMAGE}
    command: ["npx", "serve", "-s", "dist", "-l", "8000"] # 🌟 保留原生命令
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://${SERVER_IP}:${GATEWAY_PORT}/api
    networks:
      - iiot-net
    deploy:
      replicas: ${WEB_REPLICAS:-2}

  # 5. 专业闸口 (Nginx Gateway)
  nginx-gateway:
    image: "${IIOT_NGINX_IMAGE}"
    ports:
      - "${GATEWAY_PORT}:80"
    volumes:
      # 挂载修复后的主配置文件
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - iiot-net
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  iiot-net:
    driver: overlay
    attachable: true

volumes:
  postgres-iiot: {}