name: cloud-image

on:
  workflow_dispatch:
    inputs:
      emergency_confirm:
        description: "Emergency only. Type EMERGENCY_CLOUD_IMAGE_BUILD to run the old self-hosted image builder."
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-push:
    runs-on: [self-hosted, iiot-linux-prod]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: iiot-httpapi
            service: httpapi
            dockerfile: src/hosts/IIoT.HttpApi/Dockerfile
          - image: iiot-gateway
            service: gateway
            dockerfile: src/hosts/IIoT.Gateway/Dockerfile
          - image: iiot-dataworker
            service: dataworker
            dockerfile: src/hosts/IIoT.DataWorker/Dockerfile
          - image: iiot-migrationworkapp
            service: migration
            dockerfile: src/hosts/IIoT.MigrationWorkApp/Dockerfile
          - image: iiot-web
            service: web
            dockerfile: src/hosts/IIoT.AppHost/iiot-web.Dockerfile

    steps:
      - name: Validate emergency confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [ '${{ inputs.emergency_confirm }}' != 'EMERGENCY_CLOUD_IMAGE_BUILD' ]; then
            echo "cloud-image is no longer a routine production release path. Use local build-and-push + SSH deploy." >&2
            exit 64
          fi

      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Checkout via archive fallback
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/source-${GITHUB_SHA}.zip"
          extract_root="$(mktemp -d "$RUNNER_TEMP/source.XXXXXX")"
          rm -f "$archive"
          curl --fail --location --retry 5 --retry-delay 5 --connect-timeout 20 --max-time 300 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://codeload.github.com/${GITHUB_REPOSITORY}/zip/${GITHUB_SHA}" \
            -o "$archive"
          unzip -q "$archive" -d "$extract_root"
          extracted="$(find "$extract_root" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          shopt -s dotglob
          cp -a "$extracted"/* "$GITHUB_WORKSPACE"/

      - name: Detect image relevance
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          service="${{ matrix.service }}"
          build=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            build=true
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || printf '%s' "$before" | grep -Eq '^0+$'; then
              build=true
            else
              changed_files="$(mktemp)"
              if [ -d .git ]; then
                git fetch --no-tags --prune --depth=50 origin "${GITHUB_REF_NAME:-main}" || true
              fi

              if [ -d .git ] \
                && git cat-file -e "$before^{commit}" 2>/dev/null \
                && git cat-file -e "$GITHUB_SHA^{commit}" 2>/dev/null; then
                git diff --name-only "$before" "$GITHUB_SHA" > "$changed_files"
              else
                echo "Git history is unavailable for path filtering; building $service image." >> "$GITHUB_STEP_SUMMARY"
                build=true
              fi

              if [ "$build" != "true" ]; then
                if grep -Eq '^(Directory\.Build\.props|global\.json|IIoT\.CloudPlatform\.slnx|\.dockerignore)$' "$changed_files" \
                  || grep -Eq '^src/(core|shared|services|infrastructure)/' "$changed_files" \
                  || grep -Eq '^src/hosts/IIoT\.ServiceDefaults/' "$changed_files"; then
                  build=true
                else
                  case "$service" in
                    httpapi)
                      grep -Eq '^src/hosts/IIoT\.HttpApi/' "$changed_files" && build=true
                      ;;
                    gateway)
                      grep -Eq '^src/hosts/IIoT\.Gateway/' "$changed_files" && build=true
                      ;;
                    dataworker)
                      grep -Eq '^src/hosts/IIoT\.DataWorker/' "$changed_files" && build=true
                      ;;
                    migration)
                      grep -Eq '^src/hosts/IIoT\.MigrationWorkApp/' "$changed_files" && build=true
                      ;;
                    web)
                      grep -Eq '^(src/ui/iiot-web/|src/hosts/IIoT\.AppHost/iiot-web\.Dockerfile)$' "$changed_files" && build=true
                      ;;
                    *)
                      echo "Unknown service in matrix: $service" >&2
                      exit 64
                      ;;
                  esac
                fi
              fi
            fi
          fi

          echo "build=$build" >> "$GITHUB_OUTPUT"
          if [ "$build" != "true" ]; then
            echo "No relevant changes for ${{ matrix.image }}; skipping Docker build." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Resolve Harbor target
        if: steps.changes.outputs.build == 'true'
        id: registry
        shell: bash
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          OCI_REGISTRY_USERNAME: ${{ secrets.OCI_REGISTRY_USERNAME }}
          OCI_REGISTRY_PASSWORD: ${{ secrets.OCI_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          registry="${OCI_REGISTRY:-}"
          namespace="${OCI_NAMESPACE:-}"
          if [ -z "$registry" ] || [ -z "$namespace" ]; then
            echo "OCI_REGISTRY and OCI_NAMESPACE are required for the intranet self-hosted runner flow." >&2
            exit 64
          fi
          if [ -z "${OCI_REGISTRY_USERNAME:-}" ] || [ -z "${OCI_REGISTRY_PASSWORD:-}" ]; then
            echo "OCI_REGISTRY_USERNAME and OCI_REGISTRY_PASSWORD are required for Harbor push." >&2
            exit 64
          fi
          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "image=$registry/$namespace/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          echo "release_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate runner and Docker
        if: steps.changes.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then
            echo "Self-hosted runner must not run as root." >&2
            exit 64
          fi
          docker version >/dev/null
          docker buildx version >/dev/null

      - name: Log in to Harbor
        if: steps.changes.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.OCI_REGISTRY_PASSWORD }}" |
            docker login "${{ steps.registry.outputs.registry }}" \
              --username "${{ secrets.OCI_REGISTRY_USERNAME }}" \
              --password-stdin

      - name: Build and push image
        if: steps.changes.outputs.build == 'true'
        shell: bash
        env:
          VITE_AICOPILOT_CHALLENGE_URL: ${{ vars.VITE_AICOPILOT_CHALLENGE_URL }}
        run: |
          set -euo pipefail
          image="${{ steps.registry.outputs.image }}"
          release_tag="${{ steps.registry.outputs.release_tag }}"
          cache_ref="$image:buildcache"
          challenge_url="${VITE_AICOPILOT_CHALLENGE_URL:-http://10.98.90.154:82/api/identity/cloud-oidc/challenge}"
          tags=(--tag "$image:$release_tag")
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags+=(--tag "$image:main-latest")
          fi

          docker buildx build \
            --push \
            --file "${{ matrix.dockerfile }}" \
            --build-arg "DOTNET_SDK_IMAGE=${{ steps.registry.outputs.registry }}/mirror/dotnet-sdk:10.0.301" \
            --build-arg "DOTNET_ASPNET_IMAGE=${{ steps.registry.outputs.registry }}/mirror/dotnet-aspnet:10.0.9" \
            --build-arg "VITE_AICOPILOT_CHALLENGE_URL=$challenge_url" \
            --build-arg "NODE_BASE_IMAGE=${{ steps.registry.outputs.registry }}/mirror/node:22-slim" \
            --build-arg "NGINX_BASE_IMAGE=${{ steps.registry.outputs.registry }}/mirror/nginx:1.27-alpine" \
            --cache-from "type=registry,ref=$cache_ref" \
            --cache-to "type=registry,ref=$cache_ref,mode=max" \
            "${tags[@]}" \
            .

          {
            echo "### Cloud image"
            echo "- Service: \`${{ matrix.service }}\`"
            echo "- Image: \`$image\`"
            echo "- Release tag: \`$release_tag\`"
            echo "- Deploy services input: \`${{ matrix.service }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          mkdir -p "$RUNNER_TEMP/cloud-built-services"
          printf '%s\n' "${{ matrix.service }}" > "$RUNNER_TEMP/cloud-built-services/${{ matrix.service }}.txt"

      - name: Upload built service hint
        if: steps.changes.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cloud-built-service-${{ matrix.service }}
          path: ${{ runner.temp }}/cloud-built-services/${{ matrix.service }}.txt
          if-no-files-found: error
          retention-days: 14

      - name: Prune old Harbor image tags
        if: steps.changes.outputs.build == 'true'
        shell: bash
        env:
          HARBOR_URL: ${{ steps.registry.outputs.registry }}
          HARBOR_PROJECT: ${{ steps.registry.outputs.namespace }}
          HARBOR_USERNAME: ${{ secrets.OCI_REGISTRY_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.OCI_REGISTRY_PASSWORD }}
          HARBOR_KEEP_SHA_TAGS: 3
        run: |
          set -euo pipefail
          bash deploy/scripts/harbor-retention.sh "${{ matrix.image }}"
