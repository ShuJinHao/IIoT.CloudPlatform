name: cloud-routine-request
run-name: Cloud routine request ${{ inputs.invocation_id }}

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Inspect current production state or deliver a deployment request
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - inspect
      invocation_id:
        description: Digest-bound routine invocation id
        required: true
        type: string
      request_base64:
        description: Base64 encoded non-secret routine request.env
        required: false
        default: ''
        type: string
      request_sha256:
        description: SHA-256 of the decoded request.env bytes
        required: false
        default: ''
        type: string
      confirm:
        description: Type ROUTINE_CLOUD_REQUEST
        required: true
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: [self-hosted, iiot-linux-prod]
    environment: production
    timeout-minutes: 35

    steps:
      - name: Checkout pinned runner source
        if: inputs.operation == 'deploy'
        uses: actions/checkout@v4

      - name: Export allowlisted current production state
        if: inputs.operation == 'inspect'
        shell: bash
        env:
          DEPLOY_TARGET_DIR: ${{ secrets.DEPLOY_TARGET_DIR }}
          INVOCATION_ID: ${{ inputs.invocation_id }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          [ "$CONFIRM" = "ROUTINE_CLOUD_REQUEST" ] || { echo "invalid Cloud routine confirmation" >&2; exit 64; }
          [[ "$INVOCATION_ID" =~ ^[A-Za-z0-9._-]{1,96}$ ]] || { echo "invalid invocation id" >&2; exit 64; }
          [ "$(id -un)" = "github-runner" ] && [ "$(id -u)" -ne 0 ] || { echo "inspection must run as github-runner non-root" >&2; exit 77; }
          state="$DEPLOY_TARGET_DIR/releases/routine-current.env"
          [ -r "$state" ] || { echo "Cloud current production state is unavailable" >&2; exit 66; }
          output="$RUNNER_TEMP/cloud-current-state.env"
          awk -F= '$1 ~ /^(RUNNER_PROTOCOL|TARGET|INVOCATION_ID|GIT_SHA|RELEASE_TAG|SERVICES|REQUEST_DIGEST|STATUS|FINISHED_AT_UTC)$/ { print }' "$state" > "$output"
          grep -Eq '^GIT_SHA=[0-9a-f]{40}$' "$output" || { echo "Cloud current state has no valid Git SHA" >&2; exit 65; }
          grep -Fx 'STATUS=healthy' "$output" >/dev/null || { echo "Cloud current state is not healthy" >&2; exit 65; }

      - name: Upload current production state
        if: inputs.operation == 'inspect'
        uses: actions/upload-artifact@v4
        with:
          name: routine-state-${{ inputs.invocation_id }}
          path: ${{ runner.temp }}/cloud-current-state.env
          if-no-files-found: error
          retention-days: 1

      - name: Deliver immutable request to stable runner
        if: inputs.operation == 'deploy'
        shell: bash
        env:
          DEPLOY_TARGET_DIR: ${{ secrets.DEPLOY_TARGET_DIR }}
          INVOCATION_ID: ${{ inputs.invocation_id }}
          REQUEST_BASE64: ${{ inputs.request_base64 }}
          REQUEST_SHA256: ${{ inputs.request_sha256 }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          [ "$CONFIRM" = "ROUTINE_CLOUD_REQUEST" ] || { echo "invalid Cloud routine confirmation" >&2; exit 64; }
          [[ "$INVOCATION_ID" =~ ^[A-Za-z0-9._-]{1,96}$ ]] || { echo "invalid invocation id" >&2; exit 64; }
          [[ "$REQUEST_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "invalid request SHA-256" >&2; exit 64; }
          [ "$(id -un)" = "github-runner" ] && [ "$(id -u)" -ne 0 ] || {
            echo "routine request must run as github-runner non-root" >&2
            exit 77
          }
          [ -n "$DEPLOY_TARGET_DIR" ] || { echo "DEPLOY_TARGET_DIR is required" >&2; exit 64; }

          runner="$DEPLOY_TARGET_DIR/runner/iiot-release-runner.sh"
          runner_source="$GITHUB_WORKSPACE/deploy/runner/iiot-release-runner.sh"
          if [ ! -e "$runner" ]; then
            [ -r "$runner_source" ] || { echo "pinned Cloud runner source is missing" >&2; exit 66; }
            mkdir -p "$DEPLOY_TARGET_DIR/runner" \
              "$DEPLOY_TARGET_DIR/releases/routine-history" \
              "$DEPLOY_TARGET_DIR/releases/routine-incoming" \
              "$DEPLOY_TARGET_DIR/.locks" \
              "$DEPLOY_TARGET_DIR/backups/postgres"
            runner_temp="$DEPLOY_TARGET_DIR/runner/.iiot-release-runner.$$.tmp"
            trap 'rm -f "${runner_temp:-}"' EXIT
            install -m 700 "$runner_source" "$runner_temp"
            mv -f "$runner_temp" "$runner"
            trap - EXIT
            echo "runner_bootstrap=installed target=Cloud path=$runner"
          fi
          [ -x "$runner" ] || { echo "stable Cloud runner is not executable: $runner" >&2; exit 66; }
          request_file="$(mktemp "$RUNNER_TEMP/cloud-request.XXXXXX")"
          trap 'rm -f "$request_file"' EXIT
          printf '%s' "$REQUEST_BASE64" | base64 --decode > "$request_file"
          [ -s "$request_file" ] && [ "$(wc -c < "$request_file")" -le 16384 ] || {
            echo "decoded Cloud request is empty or too large" >&2
            exit 65
          }
          actual_sha256="$(sha256sum "$request_file" | awk '{print $1}')"
          [ "$actual_sha256" = "$REQUEST_SHA256" ] || { echo "Cloud request transport digest mismatch" >&2; exit 65; }
          grep -Fx "TARGET=Cloud" "$request_file" >/dev/null || { echo "Cloud request target mismatch" >&2; exit 65; }
          grep -Fx "INVOCATION_ID=$INVOCATION_ID" "$request_file" >/dev/null || { echo "Cloud invocation mismatch" >&2; exit 65; }

          cat "$request_file" | "$runner" --target cloud --expected-user github-runner --request-stdin
