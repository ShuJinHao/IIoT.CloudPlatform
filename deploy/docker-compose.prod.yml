# Single-machine production starter for IIoT.CloudPlatform.
# This template intentionally keeps one gateway and one HttpApi destination in this batch.
services:
  postgres:
    image: ${IIOT_POSTGRES_IMAGE}
    mem_limit: ${POSTGRES_MEM_LIMIT:-4g}
    cpus: ${POSTGRES_CPUS:-2.0}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: iiot-db
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iiot-db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - iiot-net

  redis-cache:
    image: ${IIOT_REDIS_IMAGE}
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    cpus: ${REDIS_CPUS:-0.5}
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - iiot-net

  rabbitmq:
    image: ${IIOT_RABBITMQ_IMAGE}
    mem_limit: ${RABBITMQ_MEM_LIMIT:-1g}
    cpus: ${RABBITMQ_CPUS:-1.0}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - 127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - iiot-net

  seq:
    image: ${IIOT_SEQ_IMAGE}
    mem_limit: ${SEQ_MEM_LIMIT:-512m}
    cpus: ${SEQ_CPUS:-0.5}
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINUSERNAME: admin
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    ports:
      - 127.0.0.1:${SEQ_HOST_PORT:-5341}:80
    volumes:
      - seq-data:/data
    restart: unless-stopped
    networks:
      - iiot-net

  iiot-migration:
    image: ${IIOT_MIGRATION_IMAGE}
    environment:
      ConnectionStrings__iiot-db: Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db
      ConnectionStrings__redis-cache: redis-cache:6379
      JwtSettings__Secret: ${JWTSETTINGS__SECRET}
      SEED_ADMIN_NO: ${SEED_ADMIN_NO}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      ALLOW_INTRANET_HTTP_OIDC: ${ALLOW_INTRANET_HTTP_OIDC:-false}
      OidcProvider__Issuer: ${OIDC_PROVIDER_ISSUER}
      OidcProvider__AllowIntranetHttpOidc: ${ALLOW_INTRANET_HTTP_OIDC:-false}
      OidcProvider__AicopilotRedirectUris__0: ${AICOPILOT_OIDC_REDIRECT_URI}
      OidcProvider__AicopilotPostLogoutRedirectUris__0: ${AICOPILOT_OIDC_POST_LOGOUT_REDIRECT_URI}
      OidcProvider__SigningCertificatePath: ${OIDC_PROVIDER_SIGNING_CERTIFICATE_PATH:-}
      OidcProvider__SigningCertificatePassword: ${OIDC_PROVIDER_SIGNING_CERTIFICATE_PASSWORD:-}
      Seq__Enabled: true
      Seq__ServerUrl: ${SEQ_SERVER_URL}
      Seq__ApiKey: ${SEQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    restart: "no"
    networks:
      - iiot-net

  iiot-httpapi:
    image: ${IIOT_HTTPAPI_IMAGE}
    mem_limit: ${HTTPAPI_MEM_LIMIT:-1536m}
    cpus: ${HTTPAPI_CPUS:-1.5}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__iiot-db: Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db
      ConnectionStrings__redis-cache: redis-cache:6379
      ConnectionStrings__eventbus: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      JwtSettings__Secret: ${JWTSETTINGS__SECRET}
      ForwardedHeaders__Enabled: ${FORWARDED_HEADERS_ENABLED}
      ForwardedHeaders__ForwardLimit: ${FORWARDED_HEADERS_FORWARDLIMIT}
      ForwardedHeaders__KnownNetworks__0: ${FORWARDED_HEADERS_KNOWNNETWORKS__0}
      ForwardedHeaders__KnownNetworks__1: ${FORWARDED_HEADERS_KNOWNNETWORKS__1}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN_0}
      Cors__AllowedOrigins__1: ${CORS_ALLOWED_ORIGIN_1}
      Cors__AllowedOrigins__2: ${CORS_ALLOWED_ORIGIN_2}
      EdgeInstallerArtifacts__RootPath: /app/edge-updates/installers
      EdgeInstallerArtifacts__VelopackReleasesBaseUrl: ${PUBLIC_BASE_URL}/edge-updates/velopack
      EdgeRelease__MaxVersionsPerComponent: ${EDGE_RELEASE_MAX_VERSIONS_PER_COMPONENT:-3}
      EdgeReleaseUpload__MaxUploadMbps: ${EDGE_RELEASE_UPLOAD_MAX_MBPS:-100}
      EdgeReleaseUpload__MaxBundleBytes: ${EDGE_RELEASE_UPLOAD_MAX_BUNDLE_BYTES:-2147483648}
      Infrastructure__Postgres__EnableRetry: ${POSTGRES_ENABLE_RETRY:-true}
      Infrastructure__EventBus__ConcurrentMessageLimit: ${EVENTBUS_CONCURRENT_MESSAGE_LIMIT:-16}
      Infrastructure__EventBus__PrefetchMultiplier: ${EVENTBUS_PREFETCH_MULTIPLIER:-4}
      ALLOW_INTRANET_HTTP_OIDC: ${ALLOW_INTRANET_HTTP_OIDC:-false}
      OidcProvider__Issuer: ${OIDC_PROVIDER_ISSUER}
      OidcProvider__AllowIntranetHttpOidc: ${ALLOW_INTRANET_HTTP_OIDC:-false}
      OidcProvider__AicopilotRedirectUris__0: ${AICOPILOT_OIDC_REDIRECT_URI}
      OidcProvider__AicopilotPostLogoutRedirectUris__0: ${AICOPILOT_OIDC_POST_LOGOUT_REDIRECT_URI}
      OidcProvider__SigningCertificatePath: ${OIDC_PROVIDER_SIGNING_CERTIFICATE_PATH:-}
      OidcProvider__SigningCertificatePassword: ${OIDC_PROVIDER_SIGNING_CERTIFICATE_PASSWORD:-}
      Infrastructure__EventBus__EndpointPrefix: ${Infrastructure__EventBus__EndpointPrefix}
      RateLimiting__CapacityUpload__TokenLimit: ${RATE_LIMIT_CAPACITY_UPLOAD_TOKEN_LIMIT:-600}
      RateLimiting__CapacityUpload__TokensPerPeriod: ${RATE_LIMIT_CAPACITY_UPLOAD_TOKENS_PER_PERIOD:-600}
      RateLimiting__DeviceLogUpload__TokenLimit: ${RATE_LIMIT_DEVICE_LOG_UPLOAD_TOKEN_LIMIT:-600}
      RateLimiting__DeviceLogUpload__TokensPerPeriod: ${RATE_LIMIT_DEVICE_LOG_UPLOAD_TOKENS_PER_PERIOD:-600}
      RateLimiting__PassStationUpload__TokenLimit: ${RATE_LIMIT_PASS_STATION_UPLOAD_TOKEN_LIMIT:-3000}
      RateLimiting__PassStationUpload__TokensPerPeriod: ${RATE_LIMIT_PASS_STATION_UPLOAD_TOKENS_PER_PERIOD:-3000}
      Seq__Enabled: true
      Seq__ServerUrl: ${SEQ_SERVER_URL}
      Seq__ApiKey: ${SEQ_API_KEY}
    volumes:
      - ${OIDC_PROVIDER_CERTS_DIR:-/data/iiot-platform/cloud/deploy/certs}:/app/certs:ro
      # 内网受控 Edge HTTP 发布需要 HttpApi 写 staging 和最终发布目录；nginx 仍只读对外提供下载。
      - ${EDGE_UPDATES_DIR:-/data/iiot-platform/edge-client/edge-updates}:/app/edge-updates:rw
      - httpapi-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iiot-net

  iiot-gateway:
    image: ${IIOT_GATEWAY_IMAGE}
    mem_limit: ${GATEWAY_MEM_LIMIT:-512m}
    cpus: ${GATEWAY_CPUS:-0.5}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Single-node launch keeps one explicit upstream destination.
      ReverseProxy__Clusters__httpapi__Destinations__primary__Address: http://iiot-httpapi:8080/
      EdgeReleaseUpload__MaxBundleBytes: ${EDGE_RELEASE_UPLOAD_MAX_BUNDLE_BYTES:-2147483648}
      Seq__Enabled: true
      Seq__ServerUrl: ${SEQ_SERVER_URL}
      Seq__ApiKey: ${SEQ_API_KEY}
    depends_on:
      - iiot-httpapi
    restart: unless-stopped
    networks:
      - iiot-net

  iiot-dataworker:
    image: ${IIOT_DATAWORKER_IMAGE}
    mem_limit: ${DATAWORKER_MEM_LIMIT:-1536m}
    cpus: ${DATAWORKER_CPUS:-2.0}
    healthcheck:
      test: ["CMD", "dotnet", "IIoT.DataWorker.dll", "--healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__iiot-db: Host=postgres;Port=5432;Username=postgres;Password=${PG_PASSWORD};Database=iiot-db
      ConnectionStrings__redis-cache: redis-cache:6379
      ConnectionStrings__eventbus: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      JwtSettings__Secret: ${JWTSETTINGS__SECRET}
      Infrastructure__Postgres__EnableRetry: ${POSTGRES_ENABLE_RETRY:-true}
      Infrastructure__EventBus__ConcurrentMessageLimit: ${EVENTBUS_CONCURRENT_MESSAGE_LIMIT:-16}
      Infrastructure__EventBus__PrefetchMultiplier: ${EVENTBUS_PREFETCH_MULTIPLIER:-4}
      Infrastructure__EventBus__EndpointPrefix: ${Infrastructure__EventBus__EndpointPrefix}
      Infrastructure__EventBus__Consumers__PassStationConcurrentMessageLimit: ${PASS_STATION_CONSUMER_CONCURRENCY:-16}
      Infrastructure__EventBus__Consumers__DeviceLogConcurrentMessageLimit: ${DEVICE_LOG_CONSUMER_CONCURRENCY:-8}
      Infrastructure__EventBus__Consumers__HourlyCapacityConcurrentMessageLimit: ${HOURLY_CAPACITY_CONSUMER_CONCURRENCY:-4}
      Outbox__BatchSize: ${OUTBOX_BATCH_SIZE:-500}
      Outbox__PollingIntervalSeconds: ${OUTBOX_POLLING_INTERVAL_SECONDS:-1}
      Seq__Enabled: true
      Seq__ServerUrl: ${SEQ_SERVER_URL}
      Seq__ApiKey: ${SEQ_API_KEY}
    volumes:
      - dataworker-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iiot-net

  iiot-web:
    image: ${IIOT_WEB_IMAGE}
    mem_limit: ${WEB_MEM_LIMIT:-256m}
    cpus: ${WEB_CPUS:-0.25}
    depends_on:
      - iiot-gateway
    restart: unless-stopped
    networks:
      - iiot-net

  nginx-gateway:
    image: ${IIOT_NGINX_IMAGE}
    mem_limit: ${NGINX_MEM_LIMIT:-256m}
    cpus: ${NGINX_CPUS:-0.5}
    user: ${NGINX_UID:-101}:${NGINX_GID:-101}
    ports:
      - ${GATEWAY_HTTP_PORT:-80}:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${EDGE_UPDATES_DIR:-/data/iiot-platform/edge-client/edge-updates}:/usr/share/nginx/html/edge-updates:ro
    depends_on:
      - iiot-gateway
      - iiot-web
    restart: unless-stopped
    networks:
      - iiot-net

networks:
  iiot-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  seq-data:
  httpapi-logs:
  dataworker-logs:
