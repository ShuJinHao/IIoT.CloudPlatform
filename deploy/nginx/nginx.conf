pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    log_format iiot_gateway
        'request_id=$request_id remote_addr=$remote_addr method=$request_method '
        'route_path="$uri" status=$status request_time=$request_time '
        'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
        'upstream_response_time="$upstream_response_time"';
    access_log /dev/stdout iiot_gateway;
    error_log /dev/stderr warn;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied no-cache no-store private expired auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml;

    upstream gateway_pool {
        server iiot-gateway:8080;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=refresh_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=bootstrap_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=edge_upload_limit:20m rate=12000r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=300r/m;

    server {
        listen 8080;
        server_name _;

        resolver 127.0.0.11 valid=30s;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http: ws:; font-src 'self' data:; frame-ancestors 'none'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

        location = /edge-updates/ {
            return 404;
        }

        location ~* ^/edge-updates/(?:\.|.*/\.) {
            return 404;
        }

        location = /edge-updates/RELEASES {
            root /usr/share/nginx/html;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http: ws:; font-src 'self' data:; frame-ancestors 'none'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }

        location ~* ^/edge-updates/releases\..*\.json$ {
            root /usr/share/nginx/html;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http: ws:; font-src 'self' data:; frame-ancestors 'none'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }

        location ~* ^/edge-updates/.+\.nupkg$ {
            root /usr/share/nginx/html;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http: ws:; font-src 'self' data:; frame-ancestors 'none'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        location /edge-updates/ {
            root /usr/share/nginx/html;
            autoindex off;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' http: ws:; font-src 'self' data:; frame-ancestors 'none'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }

        location = /api/v1/human/client-releases/edge-release-bundles {
            limit_req zone=api_limit burst=2 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
            client_max_body_size 2048m;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_connect_timeout 90;
            proxy_send_timeout 1800;
            proxy_read_timeout 1800;
        }

        location ^~ /.well-known/ {
            limit_req zone=api_limit burst=120 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }

        location ^~ /connect/ {
            limit_req zone=api_limit burst=120 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }

        location / {
            proxy_pass http://iiot-web:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /internal/healthz {
            allow 127.0.0.1;
            allow ::1;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }

        location = /api/v1/human/identity/login {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }

        location = /api/v1/human/identity/refresh {
            limit_req zone=refresh_limit burst=30 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }

        location /api/v1/bootstrap/ {
            limit_req zone=bootstrap_limit burst=30 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }

        location ~ ^/api/v1/edge/(capacity/hourly|device-logs|pass-stations|process-records|edge-hosts/plc-runtime-states) {
            limit_req zone=edge_upload_limit burst=2000 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
            client_max_body_size 100m;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }

        location /api/ {
            limit_req zone=api_limit burst=120 nodelay;
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
            client_max_body_size 100m;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }
    }
}
